server {
    listen 80;
    server_name patent-drawing.sncbears.cloud;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /home/ubuntu/PatentHelper/certbot/www;
        allow all;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name patent-drawing.sncbears.cloud;
    
    # SSL certificates
    ssl_certificate /home/ubuntu/PatentHelper/certbot/conf/live/patent-drawing.sncbears.cloud/fullchain.pem;
    ssl_certificate_key /home/ubuntu/PatentHelper/certbot/conf/live/patent-drawing.sncbears.cloud/privkey.pem;
    include /home/ubuntu/PatentHelper/certbot/conf/options-ssl-nginx.conf;
    ssl_dhparam /home/ubuntu/PatentHelper/certbot/conf/ssl-dhparams.pem;
    
    # Increase max body size for PDF uploads
    client_max_body_size 100M;

    # Frontend proxy
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for large file uploads
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }
}