name: Build and Deploy ECS

on:
  push:
    branches:
      - main
    paths:
      - 'deploy_aws/ecs/**'
      - '.github/workflows/deploy-ecs.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: patent-helper-ocr
  ECS_CLUSTER: patent-helper-cluster-prod
  ECS_TASK_DEFINITION: patent-helper-ocr-prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f deploy_aws/ecs/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update ECS task definition
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # Get the current task definition and remove unnecessary fields
        TASK_DEFINITION=$(aws ecs describe-task-definition \
          --task-definition $ECS_TASK_DEFINITION \
          --region $AWS_REGION \
          --query taskDefinition)
        
        # Update the image and remove fields that shouldn't be in the registration
        NEW_TASK_DEFINITION=$(echo $TASK_DEFINITION | jq \
          --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
          '.containerDefinitions[0].image = $IMAGE | 
           del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)')
        
        # Register the new task definition
        aws ecs register-task-definition \
          --cli-input-json "$NEW_TASK_DEFINITION" \
          --region $AWS_REGION
        
        echo "Task definition updated successfully"