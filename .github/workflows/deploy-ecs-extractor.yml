name: Deploy ECS Extractor (Mapping Extraction)

on:
  push:
    branches: [ main ]
    paths:
      - 'deploy_aws/ecs-extractor/**'
      - 'app/core/**'
      - 'app/services/text_analyzer.py'
      - 'app/services/image_processor.py'
      - '.github/workflows/deploy-ecs-extractor.yml'

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: patent-helper-extractor
  ECS_SERVICE: patent-helper-extractor-service
  ECS_CLUSTER: patent-helper-cluster-prod
  TASK_DEFINITION: patent-helper-extractor-prod
  CONTAINER_NAME: extractor-processor

jobs:
  deploy:
    name: Deploy Extractor to ECS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Create ECR repository if not exists
      run: |
        aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} || \
        aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }}

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd deploy_aws/ecs-extractor
        
        # Copy app directory
        cp -r ../../app .
        
        # Build and push
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Update ECS task definition
      run: |
        # Check if task definition exists
        if aws ecs describe-task-definition --task-definition ${{ env.TASK_DEFINITION }} 2>/dev/null; then
          echo "Updating existing task definition"
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.TASK_DEFINITION }} --query 'taskDefinition')
          
          # Update image
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "${{ env.image }}" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          
          # Register new task definition
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF"
        else
          echo "Task definition does not exist. It will be created via CloudFormation."
        fi