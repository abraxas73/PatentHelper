name: Deploy Fly Extractor

on:
  # main push 시 자동 배포
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'fly/extractor/**'
      - '.github/workflows/deploy-fly-extractor.yml'
  workflow_dispatch:

concurrency:
  group: deploy-fly-extractor
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --config fly/extractor/fly.toml --dockerfile fly/extractor/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
