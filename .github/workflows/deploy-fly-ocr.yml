name: Deploy Fly OCR

on:
  # Fly 앱 생성 + FLY_API_TOKEN 시크릿 등록 후 아래 push 블록 주석 해제
  # push:
  #   branches: [main]
  #   paths:
  #     - 'app/**'
  #     - 'fly/ocr/**'
  #     - '.github/workflows/deploy-fly-ocr.yml'
  workflow_dispatch:

concurrency:
  group: deploy-fly-ocr
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy (PyTorch+EasyOCR 이미지, remote builder 필수)
        run: flyctl deploy --config fly/ocr/fly.toml --dockerfile fly/ocr/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
